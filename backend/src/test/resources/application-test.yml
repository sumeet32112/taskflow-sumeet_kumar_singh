# Used when @ActiveProfiles("test") — overrides main application.yml
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskflow_test}
    username: ${DB_USER:taskflow}
    password: ${DB_PASSWORD:taskflow}
  flyway:
    enabled: true
    clean-on-validation-error: true

app:
  jwt:
    secret: ${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LWZvci1pbnRlZ3JhdGlvbi10ZXN0cy1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRz}
    expiration-ms: 3600000

logging:
  level:
    root: WARN
    com.taskflow: INFO
